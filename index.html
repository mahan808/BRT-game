<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BRT VPN Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: linear-gradient(135deg, #0a1628 0%, #0d2144 50%, #0a1628 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: white;
    overflow: hidden;
    user-select: none;
  }
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
  }
  .header {
    text-align: center;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(90deg, #4fc3f7, #ffffff, #4fc3f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
  }
  .header p {
    font-size: 13px;
    color: #90caf9;
    margin-top: 4px;
  }
  .level-badge {
    background: linear-gradient(135deg, #1565c0, #1e88e5);
    border: 2px solid #4fc3f7;
    border-radius: 30px;
    padding: 8px 24px;
    font-size: 16px;
    font-weight: 700;
    color: #e3f2fd;
    box-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
  }
  .stats-row {
    display: flex;
    gap: 12px;
    width: 100%;
    justify-content: center;
  }
  .stat-box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(79,195,247,0.3);
    border-radius: 14px;
    padding: 10px 18px;
    text-align: center;
    flex: 1;
  }
  .stat-box .label { font-size: 11px; color: #90caf9; }
  .stat-box .value { font-size: 20px; font-weight: 800; color: #e3f2fd; }
  .progress-area {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid rgba(79,195,247,0.2);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #90caf9;
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1565c0, #4fc3f7);
    border-radius: 10px;
    transition: width 0.2s ease;
    box-shadow: 0 0 10px rgba(79,195,247,0.5);
  }
  .progress-percent {
    text-align: center;
    font-size: 13px;
    color: #4fc3f7;
    margin-top: 6px;
    font-weight: 700;
  }
  .btn-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .click-btn {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1e88e5, #0d47a1);
    border: 4px solid #4fc3f7;
    box-shadow: 0 0 40px rgba(79,195,247,0.4), 0 0 80px rgba(79,195,247,0.15);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 900;
    color: white;
    letter-spacing: 4px;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    -webkit-user-select: none;
  }
  .click-btn:active, .click-btn.pressed {
    transform: scale(0.93);
    box-shadow: 0 0 20px rgba(79,195,247,0.6);
  }
  .click-btn .btn-sub {
    font-size: 11px;
    letter-spacing: 2px;
    color: #90caf9;
    margin-top: 4px;
    font-weight: 400;
  }
  .float-num {
    position: absolute;
    font-size: 22px;
    font-weight: 900;
    color: #4fc3f7;
    pointer-events: none;
    animation: floatUp 0.8s ease forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
  }
  .win-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .win-overlay.show { display: flex; }
  .win-box {
    background: linear-gradient(135deg, #0d2144, #1565c0);
    border: 3px solid #4fc3f7;
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
    box-shadow: 0 0 60px rgba(79,195,247,0.4);
  }
  .win-box h2 { font-size: 28px; margin-bottom: 10px; }
  .win-box p { font-size: 15px; color: #90caf9; line-height: 1.6; }
  .win-box .prize { font-size: 22px; font-weight: 800; color: #4fc3f7; margin: 12px 0; }
  .next-btn {
    margin-top: 16px;
    background: linear-gradient(135deg, #1565c0, #1e88e5);
    border: 2px solid #4fc3f7;
    color: white;
    font-size: 16px;
    font-weight: 700;
    padding: 12px 32px;
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .done-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .done-overlay.show { display: flex; }
  .done-box {
    background: linear-gradient(135deg, #1a0533, #2d1b69);
    border: 3px solid #7c4dff;
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
  }
  .done-box h2 { font-size: 26px; margin-bottom: 10px; }
  .done-box p { font-size: 14px; color: #ce93d8; line-height: 1.6; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="header">
    <h1>B R T</h1>
    <p>VPN Clicker Game</p>
  </div>

  <div class="level-badge" id="levelBadge">🏆 Level 1</div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="label">کلیک شما</div>
      <div class="value" id="clickCount">0</div>
    </div>
    <div class="stat-box">
      <div class="label">هدف</div>
      <div class="value" id="targetCount">500</div>
    </div>
    <div class="stat-box">
      <div class="label">مانده</div>
      <div class="value" id="remaining">500</div>
    </div>
  </div>

  <div class="progress-area">
    <div class="progress-label">
      <span>پیشرفت</span>
      <span id="roundInfo">دور ۱ از ۵۰</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-percent" id="progressPercent">۰٪</div>
  </div>

  <div class="btn-wrap" id="btnWrap">
    <button class="click-btn" id="clickBtn" onclick="handleClick(event)">
      B R T
      <span class="btn-sub">V P N</span>
    </button>
  </div>
</div>

<!-- Win overlay -->
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <h2>🎉 آفرین!</h2>
    <p class="prize">🏆 ۱ گیگ جایزه بردی!</p>
    <p>درخواست شما ثبت شد.<br>ادمین به زودی کانفیگ رو برات میفرسته.</p>
    <button class="next-btn" onclick="nextRound()">دور بعدی ▶</button>
  </div>
</div>

<!-- Done overlay -->
<div class="done-overlay" id="doneOverlay">
  <div class="done-box">
    <h2>🌟 افسانه‌ای!</h2>
    <p>تمام ۵۰ دور رو تموم کردی!<br>دیگه جایزه‌ای نمونده.<br><br>ممنون که با BRT VPN بودی 💙</p>
  </div>
</div>

<script>
  // ستاره‌های پس‌زمینه
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    starsEl.appendChild(s);
  }

  // تارگت‌ها
  const TARGETS = [3000, 4000, 5000, 6000, 8000, 9000, 10000];
  const MAX_ROUNDS = 50;

  function getTarget(round) {
    if (round <= 7) return TARGETS[round - 1];
    return 10000;
  }

  // خواندن state از تلگرام
  let tg = window.Telegram?.WebApp;
  let userId = null;
  let state = { clicks: 0, round: 1, done: false };

  if (tg) {
    tg.expand();
    try {
      const d = tg.initDataUnsafe;
      if (d?.user?.id) userId = d.user.id;
    } catch(e) {}
    try {
      const saved = localStorage.getItem('brt_state_' + userId);
      if (saved) state = JSON.parse(saved);
    } catch(e) {}
  }

  function saveState() {
    try {
      localStorage.setItem('brt_state_' + (userId || 'guest'), JSON.stringify(state));
    } catch(e) {}
  }

  function updateUI() {
    const target = getTarget(state.round);
    const pct = Math.min(100, Math.round(state.clicks / target * 100));
    document.getElementById('levelBadge').textContent = `🏆 Level ${state.round}`;
    document.getElementById('clickCount').textContent = state.clicks.toLocaleString('fa');
    document.getElementById('targetCount').textContent = target.toLocaleString('fa');
    document.getElementById('remaining').textContent = Math.max(0, target - state.clicks).toLocaleString('fa');
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPercent').textContent = pct + '٪';
    document.getElementById('roundInfo').textContent = `دور ${state.round} از ${MAX_ROUNDS}`;
  }

  function handleClick(e) {
    if (state.done) return;
    state.clicks++;
    saveState();
    updateUI();

    // انیمیشن عدد
    const wrap = document.getElementById('btnWrap');
    const span = document.createElement('span');
    span.className = 'float-num';
    span.textContent = '+1';
    span.style.left = (e.offsetX || 100) + 'px';
    span.style.top = (e.offsetY || 100) + 'px';
    wrap.appendChild(span);
    setTimeout(() => span.remove(), 800);

    // چک تارگت
    const target = getTarget(state.round);
    if (state.clicks >= target) {
      // ارسال پیام به بات
      if (tg && userId) {
        tg.sendData(JSON.stringify({ type: 'win', round: state.round, target: target, userId: userId }));
      }
      setTimeout(() => document.getElementById('winOverlay').classList.add('show'), 300);
    }
  }

  function nextRound() {
    document.getElementById('winOverlay').classList.remove('show');
    if (state.round >= MAX_ROUNDS) {
      state.done = true;
      saveState();
      document.getElementById('doneOverlay').classList.add('show');
      return;
    }
    state.round++;
    state.clicks = 0;
    saveState();
    updateUI();
  }

  if (state.done) {
    document.getElementById('doneOverlay').classList.add('show');
  }

  updateUI();
</script>
</body>
</html>
